##Spring Configuration
server:
  port: 8080
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"
spring:
  application:
    name: ecs_logs_test
  devtools:
    add-properties: false
  h2:
    console:
      enabled: true
      path: /h2
  profiles:
    include:
adapter:
  ecs:
    logs:
      print-on-error:
        print-req-resp: false
        print-req-resp-level: Exception
      message-id:
        enable_auto_register_message_id: true
      request:
        replacement: ""
        patterns: ""
        delimiter: ""
        fields: ""
        allow-headers: ""
        excluded-paths: "/actuator"
        show: true
      response:
        replacement: ""
        delimiter: ""
        fields: ""
        patterns: ""
        show: true
      sampling:
        rules20XJson: >
          [{"uri":"/getClient","responseCode":"200","showCount":2,"skipCount":2},
          {"uri":"/retrieveUser","responseCode":"201","showCount":2,"skipCount":2}]
        rules40XJson: >
          [{"uri":"/getClient","responseCode":"400","showCount":2,"skipCount":2,"errorCodes":"SAER400-01|SAER400-02"},
          {"uri":"/retrieveUser","responseCode":"404","showCount":2,"skipCount":2,"errorCodes":"BPER404-52"}]
      sensitive-rules:
        sensitive-data: >
          [
            {
              "uriPattern": "/getClient",
              "fieldPaths": [
                "additionalInfo.requestBody.data.identification.number"
              ],
              "maskingType": "PARTIAL",
              "enabled": true,
              "maskingChar": "*",
              "visibilityPercentage": 0.5
            },
            {
              "uriPattern": "/getClient",
              "fieldPaths": [
                "additionalInfo.responseBody.data.identification"
              ],
              "maskingType": "PARTIAL",
              "enabled": true,
              "maskingChar": "*",
              "visibilityPercentage": 0.5
            }
          ]
